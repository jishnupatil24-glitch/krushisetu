<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="google-site-verification" content="c7W0kIXSju4xE9vpgVCdDgvIfcnmm22-mUjdimuCbXQ" />
  <meta charset="utf-8" />
  <link rel="icon" href="image.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <meta name="description" content="KrishiSetu - Agriculture Labour Management Platform" />

  <link rel="apple-touch-icon" href="image.png" />
  <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <title>KrishiSetu</title>

  <style>
    /* Hide Google translate top banner */
    .goog-te-banner-frame.skiptranslate {
      display: none !important;
    }

    body {
      top: 0px !important;
    }

    /* Hide Google branding text */
    .goog-logo-link {
      display: none !important;
    }

    .goog-te-gadget {
      font-size: 0px !important;
    }

    /* Floating language selector */
    #google_translate_element {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      background: white;
      padding: 8px 10px;
      border-radius: 8px;
      box-shadow: 0 3px 8px rgba(0,0,0,0.2);
      font-family: Arial, sans-serif;
    }

    .goog-te-combo {
      border: none;
      outline: none;
      font-size: 14px;
    }
  </style>
</head>

<body>

  <noscript>You need to enable JavaScript to run this app.</noscript>

  <!-- Google Translate -->
  <div id="google_translate_element"></div>

  <!-- React App -->
  <div id="root"></div>

  <script>
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages: 'en,hi,mr',
          autoDisplay: false
        },
        'google_translate_element'
      );
    }
  </script>

  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>

</html>
